{% extends 'base.html' %}
{% block content %}
<h2>选择注册身份</h2>
<div class="row mt-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">学生注册</h5>
                <p class="card-text">如果你是在校学生，请选择此项。</p>
                <a href="{% url 'register_student' %}" class="btn btn-primary">学生注册</a>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">教师注册</h5>
                <p class="card-text">如果你是社团指导老师或管理员，请选择此项。</p>
                <a href="{% url 'register_teacher' %}" class="btn btn-success">教师注册</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
