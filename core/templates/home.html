{% extends 'base.html' %}
{% block title %}首页{% endblock %}
{% block content %}
<div class="jumbotron">
    <h1 class="display-4">欢迎使用社团考勤系统</h1>
    <p class="lead">这是一个简单的考勤及分数计算系统。</p>
    <hr class="my-4">
    {% if user.is_authenticated %}
        <p>你好，{{ user.get_full_name|default:user.username }}！</p>
        <p>请使用导航栏访问个人资料或退出。</p>
    {% else %}
        <p>请先登录或注册。</p>
        <a class="btn btn-primary btn-lg" href="{% url 'login' %}" role="button">登录</a>
        <a class="btn btn-secondary btn-lg" href="{% url 'register' %}" role="button">注册</a>
    {% endif %}
</div>
{% endblock %}
