{% extends 'base.html' %}
{% load static %}
{% block title %}登录 - 爱特社团{% endblock %}
{% block extra_head %}
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card glass-card">
            <div class="card-header bg-transparent border-0">
                <h3 class="text-center gradient-text">欢迎回来</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-glow w-100">登录</button>
                </form>
                <p class="mt-3 text-center">还没有账号？<a href="{% url 'register' %}" class="link-gradient">立即注册</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
