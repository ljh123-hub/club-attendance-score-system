{% extends 'base.html' %}
{% load static %}
{% block title %}登录 - 爱特社团{% endblock %}
{% block extra_head %}
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
{% endblock %}
{% block content %}
<div class="main-container">
    <h2 class="lead-text">登录</h2>
    <div class="card-body">
        <form method="post" class="card-body">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">登录</button>
        </form>
        <p class="mt-3 text-center">还没有账号？<a href="{% url 'register' %}" class="link-gradient">立即注册</a></p>
    </div>
</div>
{% endblock %}
